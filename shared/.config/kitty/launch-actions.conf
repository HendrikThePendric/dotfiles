# Kitty launch actions for files opened from Finder/external
# This file handles files opened from OUTSIDE Kitty

# Open text files in Neovim (by MIME type) with full shell environment
protocol file
mime text/*
action launch --hold -- ~/.config/kitty/open-file.sh -- $FILE_PATH

# Open YAML files specifically (by extension)
protocol file
ext yml,yaml
action launch --hold -- ~/.config/kitty/open-file.sh -- $FILE_PATH

# Open other common text file extensions
protocol file
ext txt,md,json,conf,log
action launch --hold -- ~/.config/kitty/open-file.sh -- $FILE_PATH

# Open directories
protocol file
mime inode/directory
action launch --type=os-window --cwd -- $FILE_PATH

# Open images with icat
protocol file
mime image/*
action launch --type=os-window kitten icat --hold -- $FILE_PATH